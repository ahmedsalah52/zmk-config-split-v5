CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# Default OS at boot for oskey (switchable at runtime via the bt_layer macros).
# oskey does not persist the choice across power cycles, so this is the fallback.
CONFIG_ZMK_OSKEY_DEFAULT_OS_WINDOWS=y

# The type_text macro emits more press/release events than the default 64-slot
# behavior queue can hold. When the queue overflows, the release event for the
# last key gets dropped and that key sticks/repeats forever (e.g. "new wwww...").
# Enlarge the queue so the whole macro fits.
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=256
